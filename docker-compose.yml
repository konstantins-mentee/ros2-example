name: ros2-example

# The image + platform are chosen automatically for the host architecture by
# .devcontainer/select-image.sh, which writes them to .env (next to this file):
#   x86_64  -> nvcr.io/nvidia/isaac/ros:...humble...  (linux/amd64)
#   aarch64 -> ros2-jazzy-arm64:dev                   (linux/arm64)
# The defaults below keep `docker compose` working on x86_64 even without .env.
#
# ~/Projects (this file's parent) is mounted as the colcon workspace src/, so
# every ROS 2 package under ~/Projects is discoverable by `colcon build`.
services:
  ros2-example:
    image: ${ROS2_IMAGE:-nvcr.io/nvidia/isaac/ros:x86_64-ros2_humble_f247dd1051869171c3fc53bb35f6b907}
    platform: ${ROS2_PLATFORM:-linux/amd64}
    container_name: ros2-example
    user: root
    stdin_open: true          # -i
    tty: true                 # -t
    network_mode: host        # simplest DDS discovery on Linux hosts
    ipc: host                 # shared-memory transport for Fast DDS
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ../:/root/ws/src
    working_dir: /root/ws
    command: bash
